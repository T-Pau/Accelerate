# cspell: ignore fontawesome inlinehilite linenums nbsp pymdownx pygments superfences

[project]
site_name = "Accelerate"
site_url = "https://accelerate.tpau.group/"
repo_url = "https://github.com/T-Pau/Accelerate"
copyright = "© 2026 Dieter Baron"
site_author = "Dieter Baron"
site_description = "Cross-Assembler for 8- and 16-bit Computers"

nav = [
   { "Accelerate" = "index.md" },
   { "Tutorials" = [
       { "index.md" =  "Tutorials/index.md" },
       { "Hello-World-C64.md" = "Tutorials/Hello-World-C64.md" }
   ]},
   { "How-To Guides" = [
       { "index.md" =  "How-To-Guides/index.md" }
   ]},
   { "Reference" = [
       { "index.md" =  "Reference/index.md" },
       { "Assembler Source File" = "Reference/Assembler-Source-File.md" },
       { "Expressions" = "Reference/Expressions.md" },
       { "Structured Values" = "Reference/Structured-Values.md" },
       { "Target Definition" = "Reference/Target-Definition.md" },
       { "CPU Definition" = "Reference/CPU-Definition.md" }
   ]},
   { "Explanations" = [
       { "index.md" =  "Explanations/index.md" },
       { "Introduction" = "Explanations/Introduction.md" },
       { "DoReCo Talk" = "https://youtu.be/Bphj10Orb8U" },
       { "Rationale" = "Explanations/Rationale.md" },
       { "Design Goals" = "Explanations/Design-Goals.md" }
   ]},
   { "License" = "License.md" },
   { "Repository" = "https://github.com/T-Pau/Accelerate" }
]

extra_css = [
    "assets/styles/style.css",
    "assets/styles/tpau.css",
]


[project.extra]
generator = false
icons = { "external" = "octicons/link-external-16" }

# plugins = [ "privacy", "search" ]


[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
options.custom_icons = ["overrides/.icons"]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.zensical.extensions.macros]


[project.theme]
custom_dir = "docs/.overrides"
favicon = "assets/images/favicon.ico"
font = false
logo = "assets/images/logo.svg"
features = [
     "navigation.indexes",
     "toc.integrate"
]

[project.theme.icon]
logo = "accelerate"
repo = "fontawesome/brands/github"
admonition = { "todo" = "fontawesome/solid/tools" }

[project.theme.palette]
primary = "custom"
